<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الاختبار الإلكتروني</title>

<!-- ============================================================
     قالب الاختبار الإلكتروني — نسخة تعمل دون اتصال بالإنترنت 100%
     ============================================================
     ✦ لا يحتاج أي اتصال: محرك المعادلات مدمج داخل الملف نفسه
     ✦ يعمل على الجوال والكمبيوتر (تصميم متجاوب)
     ✦ تغذية راجعة فورية (صحيح / خطأ) مع شرح اختياري
     ✦ دعم المعادلات الرياضية (عربي وإنجليزي) — انظر الرموز المدعومة بالأسفل
     ✦ دعم الصور (روابط، Base64، أو SVG مضمّن) للرسوم البيانية وغيرها
     ✦ إعادة الاختبار مع خلط الأسئلة والخيارات
     ✦ مراجعة الإجابات في نهاية الاختبار
     ✦ لإضافة أسئلة: انتقل إلى قسم QUESTIONS بالأسفل
       أو انسخ "برومبت الذكاء الاصطناعي" الجاهز هناك.

     ⚠️ ملاحظة للصور دون اتصال:
     - الروابط الخارجية (https://...) تحتاج إنترنت عند العرض.
     - للعمل دون اتصال كليًا استخدم صورة Base64:
       image: "data:image/png;base64,iVBORw0KG..."
       (يمكن تحويل أي صورة إلى Base64 من مواقع التحويل أو من أي
       برنامج ذكاء اصطناعي بطلب: "حوّل هذه الصورة إلى Base64 data URI")
     ============================================================ -->

<style>
  :root{
    --bg:        #F2F5F4;   /* خلفية الصفحة */
    --card:      #FFFFFF;   /* خلفية البطاقات */
    --ink:       #14302B;   /* لون النص الأساسي */
    --muted:     #5E7672;   /* نص ثانوي */
    --primary:   #0E6B5C;   /* اللون الرئيسي (أخضر معتمد) */
    --primary-2: #0A574B;
    --correct:   #1E8E5A;   /* لون الإجابة الصحيحة */
    --correct-bg:#E7F6EE;
    --wrong:     #C0392B;   /* لون الإجابة الخاطئة */
    --wrong-bg:  #FBEAE7;
    --accent:    #D9A441;   /* لمسة ذهبية للتقدم والنتيجة */
    --line:      #DCE5E2;
    --radius:    14px;
    --shadow: 0 4px 18px rgba(20,48,43,.08);
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html{ -webkit-text-size-adjust:100%; }
  body{
    font-family:"Segoe UI", Tahoma, "Noto Sans Arabic", "Geeza Pro", sans-serif;
    background:var(--bg);
    color:var(--ink);
    line-height:1.8;
    min-height:100vh;
    padding:16px;
    display:flex; justify-content:center; align-items:flex-start;
  }
  .app{ width:100%; max-width:680px; }

  /* ---------- الترويسة ---------- */
  header.quiz-head{
    background:var(--primary);
    color:#fff;
    border-radius:var(--radius);
    padding:20px 22px;
    box-shadow:var(--shadow);
    margin-bottom:14px;
  }
  header.quiz-head h1{ font-size:1.25rem; font-weight:700; }
  header.quiz-head p{ font-size:.9rem; opacity:.85; margin-top:4px; }

  /* ---------- شريط التقدم ---------- */
  .progress-wrap{
    background:var(--card);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:12px 16px;
    margin-bottom:14px;
    display:flex; align-items:center; gap:12px;
    font-size:.85rem; color:var(--muted);
  }
  .bar{ flex:1; height:8px; background:var(--line); border-radius:99px; overflow:hidden; }
  .bar > span{
    display:block; height:100%; width:0;
    background:linear-gradient(90deg, var(--primary), var(--accent));
    border-radius:99px;
    transition:width .35s ease;
  }
  .counter{ white-space:nowrap; font-weight:500; }

  /* ---------- بطاقة السؤال ---------- */
  .card{
    background:var(--card);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:22px;
  }
  .q-text{ font-size:1.08rem; font-weight:500; margin-bottom:14px; }
  .q-image{
    display:block; max-width:100%; height:auto;
    border:1px solid var(--line); border-radius:10px;
    margin:0 auto 16px;
    background:#fff;
  }
  .options{ display:flex; flex-direction:column; gap:10px; }
  button.opt{
    font:inherit; text-align:start;
    background:#FBFDFC;
    border:1.5px solid var(--line);
    border-radius:10px;
    padding:12px 14px;
    cursor:pointer;
    display:flex; align-items:flex-start; gap:10px;
    transition:border-color .15s, background .15s, transform .08s;
    color:var(--ink);
  }
  button.opt:hover:not(:disabled){ border-color:var(--primary); background:#F2FAF7; }
  button.opt:active:not(:disabled){ transform:scale(.99); }
  button.opt:focus-visible{ outline:3px solid var(--accent); outline-offset:2px; }
  button.opt:disabled{ cursor:default; opacity:.92; }
  .opt .key{
    flex-shrink:0;
    width:26px; height:26px;
    border-radius:8px;
    background:var(--line);
    color:var(--ink);
    display:flex; align-items:center; justify-content:center;
    font-size:.8rem; font-weight:700;
    margin-top:2px;
  }
  button.opt.is-correct{ border-color:var(--correct); background:var(--correct-bg); }
  button.opt.is-correct .key{ background:var(--correct); color:#fff; }
  button.opt.is-wrong{ border-color:var(--wrong); background:var(--wrong-bg); }
  button.opt.is-wrong .key{ background:var(--wrong); color:#fff; }

  /* ---------- التغذية الراجعة ---------- */
  .feedback{
    margin-top:16px;
    border-radius:10px;
    padding:14px 16px;
    font-size:.95rem;
    display:none;
    animation:pop .25s ease;
  }
  .feedback.show{ display:block; }
  .feedback.ok{ background:var(--correct-bg); border:1.5px solid var(--correct); color:#14532D; }
  .feedback.no{ background:var(--wrong-bg); border:1.5px solid var(--wrong); color:#7B241C; }
  .feedback .fb-title{ font-weight:700; display:flex; align-items:center; gap:8px; }
  .feedback .fb-explain{ margin-top:6px; color:var(--ink); }
  @keyframes pop{ from{ opacity:0; transform:translateY(6px);} to{ opacity:1; transform:none;} }
  @media (prefers-reduced-motion: reduce){
    .feedback{ animation:none; } .bar > span{ transition:none; }
  }

  /* ---------- الأزرار ---------- */
  .actions{ margin-top:16px; display:flex; gap:10px; flex-wrap:wrap; }
  .btn{
    font:inherit; font-weight:700;
    border:none; border-radius:10px;
    padding:12px 22px;
    cursor:pointer;
    transition:background .15s, transform .08s;
  }
  .btn:active{ transform:scale(.98); }
  .btn:focus-visible{ outline:3px solid var(--accent); outline-offset:2px; }
  .btn-primary{ background:var(--primary); color:#fff; }
  .btn-primary:hover{ background:var(--primary-2); }
  .btn-ghost{ background:transparent; color:var(--primary); border:1.5px solid var(--primary); }
  .btn-ghost:hover{ background:#F2FAF7; }
  .hidden{ display:none !important; }

  /* ---------- شاشة النتيجة ---------- */
  .result-score{ text-align:center; padding:10px 0 18px; }
  .result-score .big{ font-size:3rem; font-weight:700; color:var(--primary); }
  .result-score .big small{ font-size:1.3rem; color:var(--muted); font-weight:500; }
  .result-score .msg{ font-size:1.05rem; margin-top:4px; }
  .result-score .pct{ color:var(--accent); font-weight:700; }
  .review h2{ font-size:1rem; margin:18px 0 10px; color:var(--muted); font-weight:700; }
  .review-item{
    border:1.5px solid var(--line);
    border-radius:10px;
    padding:12px 14px;
    margin-bottom:10px;
    font-size:.92rem;
  }
  .review-item.good{ border-color:var(--correct); }
  .review-item.bad{ border-color:var(--wrong); }
  .review-item .rq{ font-weight:700; margin-bottom:4px; }
  .review-item .ra{ color:var(--muted); }
  .review-item .ra b.ok{ color:var(--correct); }
  .review-item .ra b.no{ color:var(--wrong); }
  .review-item img{ max-width:160px; border-radius:8px; border:1px solid var(--line); display:block; margin:6px 0; background:#fff; }

  footer.note{ text-align:center; font-size:.78rem; color:var(--muted); margin-top:18px; }

  /* ---------- محرك المعادلات المدمج (يعمل دون اتصال) ---------- */
  .math{
    display:inline-block;
    direction:ltr; unicode-bidi:isolate;
    font-family:"Cambria Math","STIX Two Math",Cambria,Georgia,serif;
    padding:0 2px;
    white-space:nowrap;
    vertical-align:middle;
  }
  .math.mdisplay{
    display:block; text-align:center;
    margin:10px auto; font-size:1.15em;
    white-space:normal;
  }
  .math i{ font-style:italic; padding:0 .5px; }
  .math sup, .math sub{ line-height:1; font-size:.72em; }
  .mfrac{
    display:inline-flex; flex-direction:column;
    vertical-align:middle; text-align:center;
    margin:0 2px; line-height:1.25; font-size:.95em;
  }
  .mnum{ border-bottom:1.5px solid currentColor; padding:0 5px 1px; }
  .mden{ padding:1px 5px 0; }
  .msqrt{ display:inline-flex; align-items:stretch; vertical-align:middle; margin:0 1px; }
  .mrad{ font-size:1.15em; line-height:1.3; align-self:flex-end; }
  .mroot{ font-size:.65em; align-self:flex-start; margin-left:-2px; }
  .mbody{ border-top:1.6px solid currentColor; padding:1px 3px 0; }
  .mtext{ font-family:inherit; font-style:normal; }
</style>
</head>
<body>
<div class="app">

  <header class="quiz-head">
    <h1 id="quizTitle"></h1>
    <p id="quizDesc"></p>
  </header>

  <div class="progress-wrap" id="progressWrap">
    <span class="counter" id="counter"></span>
    <div class="bar"><span id="barFill"></span></div>
    <span class="counter" id="scoreLive"></span>
  </div>

  <!-- بطاقة السؤال -->
  <main class="card" id="quizCard">
    <div class="q-text" id="qText"></div>
    <img class="q-image hidden" id="qImage" alt="صورة توضيحية للسؤال">
    <div class="options" id="options"></div>

    <div class="feedback" id="feedback" role="status" aria-live="polite">
      <div class="fb-title" id="fbTitle"></div>
      <div class="fb-explain" id="fbExplain"></div>
    </div>

    <div class="actions">
      <button class="btn btn-primary hidden" id="nextBtn">السؤال التالي ←</button>
    </div>
  </main>

  <!-- شاشة النتيجة -->
  <main class="card hidden" id="resultCard">
    <div class="result-score">
      <div class="big"><span id="finalScore"></span><small> / <span id="finalTotal"></span></small></div>
      <div class="msg"><span class="pct" id="finalPct"></span> — <span id="finalMsg"></span></div>
    </div>
    <div class="actions" style="justify-content:center">
      <button class="btn btn-primary" id="retryBtn">🔄 إعادة الاختبار</button>
      <button class="btn btn-ghost" id="reviewBtn">مراجعة الإجابات</button>
    </div>
    <div class="review hidden" id="reviewBox">
      <h2>مراجعة الأسئلة</h2>
      <div id="reviewList"></div>
    </div>
  </main>

  <footer class="note">قالب اختبار إلكتروني — يعمل دون اتصال بالإنترنت</footer>
</div>

<script>
/* ==================================================================
   ⚙️ الإعدادات العامة — عدّل ما تشاء
   ================================================================== */
const CONFIG = {
  title: "اختبار رياضيات أول متوسط — الفصل الدراسي الثالث ١٤٤٥",       // عنوان الاختبار
  description: "اختر الإجابة الصحيحة. تظهر التغذية الراجعة فور إجابتك.",
  shuffleQuestions: true,    // خلط ترتيب الأسئلة عند كل محاولة
  shuffleOptions:   true,    // خلط ترتيب الخيارات داخل كل سؤال
  showExplanation:  true,    // عرض الشرح بعد الإجابة (إن وُجد)
  arabicDigits:     true,    // عرض الأرقام (العداد والنتيجة) بالأرقام العربية المشرقية ٠١٢٣
  passMark:         50       // النسبة المئوية لاعتبار النتيجة "ناجحة" في رسالة النهاية
};

/* ==================================================================
   🖼️ مثال: رسم بياني SVG مضمّن داخل الملف (يعمل دون اتصال)
   يمكنك حذفه أو استبداله بصور Base64 الخاصة بك
   ================================================================== */
const SAMPLE_CHART = "data:image/svg+xml;utf8," + encodeURIComponent(
  "<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 340 220'>" +
  "<rect width='340' height='220' fill='white'/>" +
  "<line x1='45' y1='185' x2='315' y2='185' stroke='#14302B' stroke-width='2'/>" +
  "<line x1='45' y1='185' x2='45' y2='20' stroke='#14302B' stroke-width='2'/>" +
  "<text x='320' y='200' font-size='15' font-family='sans-serif'>س</text>" +
  "<text x='25' y='20' font-size='15' font-family='sans-serif'>ص</text>" +
  "<circle cx='70'  cy='168' r='5' fill='#0E6B5C'/>" +
  "<circle cx='105' cy='150' r='5' fill='#0E6B5C'/>" +
  "<circle cx='140' cy='128' r='5' fill='#0E6B5C'/>" +
  "<circle cx='175' cy='115' r='5' fill='#0E6B5C'/>" +
  "<circle cx='210' cy='88'  r='5' fill='#0E6B5C'/>" +
  "<circle cx='245' cy='70'  r='5' fill='#0E6B5C'/>" +
  "<circle cx='280' cy='45'  r='5' fill='#0E6B5C'/>" +
  "<line x1='58' y1='178' x2='295' y2='35' stroke='#D9A441' stroke-width='2' stroke-dasharray='6 4'/>" +
  "</svg>"
);

/* ==================================================================
   📝 بنك الأسئلة — أضف أسئلتك هنا
   ==================================================================
   صيغة كل سؤال (انسخ القالب وعدّله):

   {
     question: "نص السؤال — يدعم المعادلات بين علامتي $ مثل: $x^2 + 5$",
     image: "",                  // اختياري: Base64 أو SVG مضمّن أو رابط
     options: ["خيار ١", "خيار ٢", "خيار ٣", "خيار ٤"],   // من ٢ إلى ٦ خيارات
     answer: 0,                  // رقم الإجابة الصحيحة (يبدأ العد من 0)
     explanation: "شرح اختياري يظهر بعد الإجابة"
   },

   💡 المعادلات — الرموز المدعومة في المحرك المدمج (دون اتصال):
   ──────────────────────────────────────────────────────────────
   الكسور:        \frac{البسط}{المقام}        →  كسر فوق بعضه
   الجذور:        \sqrt{16}  أو  \sqrt[3]{27}  →  جذر تربيعي أو نوني
   الأسس:         x^2  أو  x^{10}              →  أُس مرفوع
   المؤشر السفلي: a_1  أو  a_{n+1}
   نص عادي داخل المعادلة: \text{كلمة}
   الرموز: \times ÷\div ±\pm ·\cdot ≤\le ≥\ge ≠\ne ≈\approx ∞\infty
           π\pi θ\theta α\alpha β\beta Δ\Delta Σ\sum ∫\int °\degree
           →\to ∈\in ∪\cup ∩\cap ∠\angle △\triangle ⊥\perp ∥\parallel
   الدوال: \sin \cos \tan \log \ln \lim
   - معادلة في سطر مستقل: استخدم $$ ... $$
   - الرموز العربية: اكتبها نصاً عادياً خارج علامات $ :
     س، ص، جا، جتا، ظا، نها، د(س)... وتُعرض بشكل سليم
   - ⚠️ مهم: داخل النصوص البرمجية اكتب الشرطة المائلة مرتين:
     "\\frac{1}{2}" وليس "\frac{1}{2}"

   🤖 برومبت جاهز لأي برنامج ذكاء اصطناعي (ChatGPT, Claude, Gemini...):
   ──────────────────────────────────────────────────────────────
   انسخ النص التالي والصقه مع المحتوى الدراسي:

   «أنشئ لي أسئلة اختيار من متعدد باللغة العربية من المحتوى المرفق،
   وأخرجها بصيغة JavaScript Array بهذا الشكل بالضبط دون أي شرح إضافي:
   { question: "نص السؤال", image: "", options: ["أ","ب","ج","د"],
     answer: 0, explanation: "الشرح" },
   حيث answer هو رقم الخيار الصحيح بدءاً من الصفر.
   إذا احتوى السؤال على معادلات فاستخدم LaTeX بين علامتي $ مقتصراً
   على: \\frac \\sqrt الأسس ^ والمؤشرات _ والرموز الشائعة
   (\\times \\div \\pm \\le \\ge \\ne \\pi)، مع كتابة الشرطة
   المائلة مرتين \\ داخل النصوص.»

   ثم الصق الناتج داخل المصفوفة QUESTIONS أدناه.
   ────────────────────────────────────────────────────────────── */
const QUESTIONS = [
  {
    "question": "ما احتمال الحصول على عدد فردي عند رمي مكعب أرقام مرة واحدة؟",
    "image": "",
    "options": [
      "١/٣",
      "١/٢",
      "٣",
      "٢"
    ],
    "answer": 1,
    "explanation": "الأعداد الفردية في مكعب الأرقام هي ١، ٣، ٥؛ أي ٣ نواتج من أصل ٦، إذن الاحتمال = ٣/٦ = ١/٢."
  },
  {
    "question": "باستعمال مبدأ العد الأساسي: أوجد عدد النواتج لاختيار شهر من أشهر السنة ويوم من أيام الأسبوع.",
    "image": "",
    "options": [
      "١٢",
      "٧",
      "٨٤",
      "١٩"
    ],
    "answer": 2,
    "explanation": "عدد الأشهر ١٢ وعدد أيام الأسبوع ٧، إذن عدد النواتج = ١٢ × ٧ = ٨٤."
  },
  {
    "question": "ما نوع الزاوية التي قياسها ٤٥°؟",
    "image": "",
    "options": [
      "حادة",
      "مستقيمة",
      "منفرجة",
      "قائمة"
    ],
    "answer": 0,
    "explanation": "الزاوية الحادة قياسها أكبر من ٠° وأقل من ٩٠°؛ لذلك ٤٥° زاوية حادة."
  },

/* ==================================================================
   ∑ محرك عرض المعادلات المدمج — لا يحتاج إنترنت
   (لا حاجة لتعديل ما يلي)
   ================================================================== */
const MiniTex = (function(){
  const SYM = {
    times:"×", div:"÷", pm:"±", mp:"∓", cdot:"·",
    le:"≤", leq:"≤", ge:"≥", geq:"≥", ne:"≠", neq:"≠",
    approx:"≈", equiv:"≡", propto:"∝", infty:"∞",
    pi:"π", theta:"θ", alpha:"α", beta:"β", gamma:"γ",
    delta:"δ", Delta:"Δ", lambda:"λ", mu:"μ", sigma:"σ",
    Sigma:"Σ", omega:"ω", Omega:"Ω", phi:"φ",
    degree:"°", circ:"°", percent:"٪",
    rightarrow:"→", to:"→", leftarrow:"←", Rightarrow:"⇒", Leftrightarrow:"⇔",
    in:"∈", notin:"∉", subset:"⊂", subseteq:"⊆", cup:"∪", cap:"∩",
    emptyset:"∅", forall:"∀", exists:"∃",
    angle:"∠", triangle:"△", perp:"⊥", parallel:"∥", cong:"≅", sim:"∼",
    sum:"∑", prod:"∏", int:"∫",
    sin:"sin", cos:"cos", tan:"tan", cot:"cot", sec:"sec", csc:"csc",
    log:"log", ln:"ln", lim:"lim", max:"max", min:"min",
    ldots:"…", cdots:"⋯", quad:"\u2002", ",":"\u2009"
  };
  const esc = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

  function compile(src){
    let i = 0;

    function parseGroup(){
      while(src[i] === " ") i++;
      if(src[i] === "{"){ i++; return parseUntil("}"); }
      if(src[i] === "\\"){
        i++;
        let name = "";
        while(i < src.length && /[a-zA-Z]/.test(src[i])) name += src[i++];
        if(SYM[name] !== undefined) return SYM[name];
        return esc(name);
      }
      const ch = src[i++] || "";
      return /[a-zA-Z]/.test(ch) ? "<i>"+ch+"</i>" : esc(ch);
    }

    function parseUntil(stop){
      let out = "";
      while(i < src.length){
        const c = src[i];
        if(stop && c === stop){ i++; return out; }

        if(c === "\\"){
          i++;
          let name = "";
          while(i < src.length && /[a-zA-Z]/.test(src[i])) name += src[i++];
          if(!name){ out += esc(src[i++] || ""); continue; }

          if(name === "frac" || name === "dfrac" || name === "tfrac"){
            const a = parseGroup(), b = parseGroup();
            out += '<span class="mfrac"><span class="mnum">'+a+'</span><span class="mden">'+b+'</span></span>';
          } else if(name === "sqrt"){
            let root = "";
            while(src[i] === " ") i++;
            if(src[i] === "["){ i++; root = parseUntil("]"); }
            const body = parseGroup();
            out += '<span class="msqrt">' +
                   (root ? '<span class="mroot">'+root+'</span>' : "") +
                   '<span class="mrad">√</span><span class="mbody">'+body+'</span></span>';
          } else if(name === "text" || name === "mathrm"){
            out += '<span class="mtext">'+parseGroup()+'</span>';
          } else if(SYM[name] !== undefined){
            out += SYM[name];
          } else {
            out += esc(name);   // أمر غير معروف: يُعرض كنص
          }
        }
        else if(c === "{"){ out += parseGroup(); }
        else if(c === "^" || c === "_"){
          i++;
          const g = parseGroup();
          out += (c === "^" ? "<sup>" : "<sub>") + g + (c === "^" ? "</sup>" : "</sub>");
        }
        else {
          out += /[a-zA-Z]/.test(c) ? "<i>"+c+"</i>" : esc(c);
          i++;
        }
      }
      return out;
    }
    return parseUntil(null);
  }

  /* يحوّل النص الكامل: ما بين $$..$$ معادلة في سطر، وما بين $..$ معادلة داخل النص */
  function render(text){
    const parts = String(text).split(/(\$\$[\s\S]+?\$\$|\$[^$\n]+\$)/g);
    let out = "";
    for(const p of parts){
      if(/^\$\$[\s\S]+\$\$$/.test(p))
        out += '<span class="math mdisplay" dir="ltr">' + compile(p.slice(2,-2)) + "</span>";
      else if(/^\$[^$\n]+\$$/.test(p))
        out += '<span class="math" dir="ltr">' + compile(p.slice(1,-1)) + "</span>";
      else
        out += p;   // النص العربي/العادي يبقى كما هو (يدعم وسوم HTML بسيطة مثل <b>)
    }
    return out;
  }
  return { render };
})();

  const $ = id => document.getElementById(id);
  const els = {
    title:$("quizTitle"), desc:$("quizDesc"),
    counter:$("counter"), bar:$("barFill"), scoreLive:$("scoreLive"),
    card:$("quizCard"), qText:$("qText"), qImage:$("qImage"), options:$("options"),
    feedback:$("feedback"), fbTitle:$("fbTitle"), fbExplain:$("fbExplain"),
    nextBtn:$("nextBtn"),
    resultCard:$("resultCard"), finalScore:$("finalScore"), finalTotal:$("finalTotal"),
    finalPct:$("finalPct"), finalMsg:$("finalMsg"),
    retryBtn:$("retryBtn"), reviewBtn:$("reviewBtn"),
    reviewBox:$("reviewBox"), reviewList:$("reviewList"),
    progress:$("progressWrap")
  };

  const AR_DIGITS = ["٠","١","٢","٣","٤","٥","٦","٧","٨","٩"];
  const num = n => CONFIG.arabicDigits
    ? String(n).replace(/\d/g, d => AR_DIGITS[d])
    : String(n);

  const KEYS = ["أ","ب","ج","د","هـ","و"];
  const M = t => MiniTex.render(t);

  let order = [], idx = 0, score = 0, answers = [], locked = false;

  function shuffle(arr){
    const a = arr.slice();
    for(let i = a.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function start(){
    order = (CONFIG.shuffleQuestions ? shuffle(QUESTIONS) : QUESTIONS.slice())
      .map(q => {
        let optIdx = q.options.map((_, i) => i);
        if(CONFIG.shuffleOptions) optIdx = shuffle(optIdx);
        return {
          src: q,
          options: optIdx.map(i => q.options[i]),
          answer: optIdx.indexOf(q.answer)
        };
      });
    idx = 0; score = 0; answers = [];
    els.resultCard.classList.add("hidden");
    els.card.classList.remove("hidden");
    els.progress.classList.remove("hidden");
    els.reviewBox.classList.add("hidden");
    render();
  }

  function render(){
    const q = order[idx];
    locked = false;

    els.counter.textContent = "السؤال " + num(idx + 1) + " من " + num(order.length);
    els.scoreLive.textContent = "النقاط: " + num(score);
    els.bar.style.width = (idx / order.length * 100) + "%";

    els.qText.innerHTML = M(q.src.question);

    if(q.src.image){
      els.qImage.src = q.src.image;
      els.qImage.classList.remove("hidden");
    } else {
      els.qImage.classList.add("hidden");
      els.qImage.removeAttribute("src");
    }

    els.options.innerHTML = "";
    q.options.forEach((opt, i) => {
      const b = document.createElement("button");
      b.className = "opt";
      b.type = "button";
      b.innerHTML = '<span class="key">' + (KEYS[i] || num(i+1)) + '</span><span class="opt-text">' + M(opt) + '</span>';
      b.addEventListener("click", () => answer(i));
      els.options.appendChild(b);
    });

    els.feedback.className = "feedback";
    els.nextBtn.classList.add("hidden");
    els.nextBtn.textContent = (idx === order.length - 1) ? "عرض النتيجة 🏁" : "السؤال التالي ←";
  }

  function answer(i){
    if(locked) return;
    locked = true;
    const q = order[idx];
    const isCorrect = (i === q.answer);
    if(isCorrect) score++;

    answers.push({
      question: q.src.question,
      image: q.src.image,
      chosen: q.options[i],
      correct: q.options[q.answer],
      isCorrect
    });

    const buttons = els.options.querySelectorAll("button.opt");
    buttons.forEach((b, bi) => {
      b.disabled = true;
      if(bi === q.answer) b.classList.add("is-correct");
      else if(bi === i)   b.classList.add("is-wrong");
    });

    els.feedback.className = "feedback show " + (isCorrect ? "ok" : "no");
    els.fbTitle.textContent = isCorrect
      ? "✅ إجابة صحيحة! أحسنت"
      : "❌ إجابة غير صحيحة — الإجابة الصحيحة موضّحة باللون الأخضر";
    els.fbExplain.innerHTML = (CONFIG.showExplanation && q.src.explanation)
      ? M(q.src.explanation) : "";
    els.scoreLive.textContent = "النقاط: " + num(score);
    els.nextBtn.classList.remove("hidden");
    els.nextBtn.focus({ preventScroll:true });
  }

  function next(){
    if(idx < order.length - 1){
      idx++;
      render();
      window.scrollTo({ top:0, behavior:"smooth" });
    } else {
      finish();
    }
  }

  function finish(){
    els.card.classList.add("hidden");
    els.progress.classList.add("hidden");
    els.resultCard.classList.remove("hidden");

    const total = order.length;
    const pct = Math.round(score / total * 100);
    els.finalScore.textContent = num(score);
    els.finalTotal.textContent = num(total);
    els.finalPct.textContent = num(pct) + "٪";
    els.finalMsg.textContent =
      pct === 100 ? "ممتاز! درجة كاملة 🌟" :
      pct >= 85   ? "متميز! أداء رائع 👏" :
      pct >= CONFIG.passMark ? "جيد، ويمكنك التحسّن بالمراجعة 📚" :
      "تحتاج إلى مزيد من المذاكرة، حاول مرة أخرى 💪";

    els.reviewList.innerHTML = "";
    answers.forEach((a, i) => {
      const d = document.createElement("div");
      d.className = "review-item " + (a.isCorrect ? "good" : "bad");
      d.innerHTML =
        '<div class="rq">' + num(i+1) + ". " + M(a.question) + "</div>" +
        (a.image ? '<img src="' + a.image + '" alt="صورة السؤال">' : "") +
        '<div class="ra">إجابتك: <b class="' + (a.isCorrect ? "ok" : "no") + '">' + M(a.chosen) + "</b>" +
        (a.isCorrect ? "" : ' — الإجابة الصحيحة: <b class="ok">' + M(a.correct) + "</b>") +
        "</div>";
      els.reviewList.appendChild(d);
    });
    window.scrollTo({ top:0, behavior:"smooth" });
  }

  // اختصارات لوحة المفاتيح: الأرقام ١-٦ للاختيار، Enter للتالي
  document.addEventListener("keydown", e => {
    if(!els.card.classList.contains("hidden")){
      const n = parseInt(e.key, 10);
      if(!locked && n >= 1 && n <= 6){
        const btn = els.options.querySelectorAll("button.opt")[n-1];
        if(btn) btn.click();
      }
      if(e.key === "Enter" && locked) next();
    }
  });

  els.nextBtn.addEventListener("click", next);
  els.retryBtn.addEventListener("click", start);
  els.reviewBtn.addEventListener("click", () => els.reviewBox.classList.toggle("hidden"));

  // التهيئة
  els.title.textContent = CONFIG.title;
  els.desc.textContent = CONFIG.description;
  document.title = CONFIG.title;
  start();
})();
</script>
</body>
</html>
